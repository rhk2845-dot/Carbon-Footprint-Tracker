<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carbon Footprint Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <nav class="nav">
      <span>🌍 Carbon Tracker</span>
      <a href="dashboard.html">📊 Dashboard</a>
    </nav>

    <h1>🌍 Carbon Footprint Tracker</h1>
    <p class="subtitle">Calculate your daily carbon emissions and get personalised tips.</p>

    <form id="calcForm">
      <label>🚗 Car Distance (km)</label>
      <input type="number" id="car" name="car" min="0" step="0.1" placeholder="e.g. 30" required>

      <label>🚌 Bus Distance (km)</label>
      <input type="number" id="bus" name="bus" min="0" step="0.1" placeholder="e.g. 10" required>

      <label>⚡ Electricity Units (kWh)</label>
      <input type="number" id="electricity" name="electricity" min="0" step="0.1" placeholder="e.g. 5" required>

      <button type="submit" id="submitBtn">Calculate Footprint</button>
    </form>

    <div class="result" id="result" hidden>
      <div class="result-header">
        <h2>Your Carbon Footprint</h2>
        <span id="impactBadge" class="badge"></span>
      </div>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-value" id="carbonVal">—</div>
          <div class="stat-label">kg CO₂</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="ecoVal">—</div>
          <div class="stat-label">Eco Score / 100</div>
        </div>
      </div>

      <div class="meter-wrap">
        <div class="meter-bar">
          <div class="meter-fill" id="meterFill"></div>
        </div>
        <div class="meter-labels">
          <span>Low</span><span>Moderate</span><span>High</span>
        </div>
      </div>

      <div class="suggestion" id="suggestion"></div>

      <a href="dashboard.html" class="btn-secondary">View History →</a>
    </div>

    <div class="error" id="errorMsg" hidden></div>
  </div>

  <script>
    const form = document.getElementById('calcForm');
    const resultDiv = document.getElementById('result');
    const errorDiv = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorDiv.hidden = true;
      resultDiv.hidden = true;
      submitBtn.textContent = 'Calculating…';
      submitBtn.disabled = true;

      const car = document.getElementById('car').value;
      const bus = document.getElementById('bus').value;
      const electricity = document.getElementById('electricity').value;

      try {
        const res = await fetch('/api/calculate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ car, bus, electricity }),
        });

        if (!res.ok) throw new Error('Calculation failed. Please try again.');

        const data = await res.json();

        document.getElementById('carbonVal').textContent = data.carbon + ' kg';
        document.getElementById('ecoVal').textContent = data.ecoScore;
        document.getElementById('suggestion').textContent = data.suggestion;

        const badge = document.getElementById('impactBadge');
        const fill = document.getElementById('meterFill');

        if (data.level === 'low') {
          badge.textContent = '🟢 Low Impact';
          badge.className = 'badge badge-low';
          fill.style.width = Math.min((data.carbon / 30) * 100, 100) * 0.33 + '%';
          fill.className = 'meter-fill fill-low';
        } else if (data.level === 'moderate') {
          badge.textContent = '🟡 Moderate Impact';
          badge.className = 'badge badge-moderate';
          fill.style.width = 33 + Math.min((data.carbon - 10) / 10, 1) * 33 + '%';
          fill.className = 'meter-fill fill-moderate';
        } else {
          badge.textContent = '🔴 High Impact';
          badge.className = 'badge badge-high';
          fill.style.width = Math.min(66 + (data.carbon - 20) * 1.5, 100) + '%';
          fill.className = 'meter-fill fill-high';
        }

        resultDiv.hidden = false;
        resultDiv.scrollIntoView({ behavior: 'smooth' });
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.hidden = false;
      } finally {
        submitBtn.textContent = 'Calculate Footprint';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
